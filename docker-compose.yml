services:

  # ============================
  # BASES DE DATOS
  # ============================

  mysql_db:
    image: mysql:8.0
    container_name: mysql_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - delivery_network

  postgres_pedidos:
    image: postgres:16-alpine
    container_name: postgres_pedidos
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_pedidos_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - delivery_network

  mongo_db:
    image: mongo:6
    container_name: mongo_db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - delivery_network

  # ============================
  # MICROSERVICIOS
  # ============================

  ms_flota:
    build: ./Backend/MS-FLOTA
    container_name: ms_flota_app
    ports:
      - "8000:8000"
    depends_on:
      mysql_db:
        condition: service_healthy
    environment:
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_HOST=mysql_db
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    restart: on-failure
    networks:
      - delivery_network

  ms_pedidos:
    build: ./Backend/MS-PEDIDOS
    container_name: ms_pedidos_app
    ports:
      - "8080:8080"
    depends_on:
      postgres_pedidos:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres_pedidos
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    restart: on-failure
    networks:
      - delivery_network

  ms_eventos:
    build: ./Backend/MS-EVENTOS
    container_name: ms_eventos_app
    ports:
      - "3000:3000"
    depends_on:
      mongo_db:
        condition: service_healthy
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_DATABASE=${MONGO_DATABASE}
    restart: on-failure
    networks:
      - delivery_network

  ms_orquestador:
    build: ./Backend/MS-ORQUESTADOR
    container_name: ms_orquestador_app
    ports:
      - "8001:8001"
    depends_on:
      - ms_flota
      - ms_pedidos
      - ms_eventos
    environment:
      - MS_FLOTA_URL=http://ms_flota_app:8000
      - MS_PEDIDOS_URL=http://ms_pedidos_app:8080
      - MS_EVENTOS_URL=http://ms_eventos_app:3000
    restart: on-failure
    networks:
      - delivery_network

  ms_analitica:
    build: ./Backend/MS-ANALITICA
    container_name: ms_analitica_app
    ports:
      - "8002:8002"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - ATHENA_S3_OUTPUT_LOCATION=${ATHENA_S3_OUTPUT_LOCATION}
      - ATHENA_DATABASE=${ATHENA_DATABASE}
    restart: on-failure
    networks:
      - delivery_network

# ============================
# VOLÚMENES
# ============================
volumes:
  mysql_data:
  postgres_pedidos_data:
  mongo_data:

# ============================
# REDES
# ============================
networks:
  delivery_network:
    driver: bridge
