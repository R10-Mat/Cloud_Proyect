services:

  # ============================
  # MICROSERVICIOS (VM1/VM2 - Capa de Aplicación)
  # ============================
  # Las BDs están en VM3 (172.31.37.211), configuradas en el .env

  ms_flota:
    build: ./Backend/MS-FLOTA
    container_name: ms_flota_app
    ports:
      - "8000:8000"
    environment:
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    restart: on-failure
    networks:
      - delivery_network

  ms_pedidos:
    build: ./Backend/MS-PEDIDOS
    container_name: ms_pedidos_app
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    restart: on-failure
    networks:
      - delivery_network

  ms_eventos:
    build: ./Backend/MS-EVENTOS
    container_name: ms_eventos_app
    ports:
      - "3000:3000"
    environment:
      - MONGO_HOST=${MONGO_HOST}
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_DATABASE=${MONGO_DATABASE}
    restart: on-failure
    networks:
      - delivery_network

  ms_orquestador:
    build: ./Backend/MS-ORQUESTADOR
    container_name: ms_orquestador_app
    ports:
      - "8001:8001"
    depends_on:
      - ms_flota
      - ms_pedidos
      - ms_eventos
    environment:
      - MS_FLOTA_URL=http://ms_flota_app:8000
      - MS_PEDIDOS_URL=http://ms_pedidos_app:8080
      - MS_EVENTOS_URL=http://ms_eventos_app:3000
    restart: on-failure
    networks:
      - delivery_network

  ms_analitica:
    build: ./Backend/MS-ANALITICA
    container_name: ms_analitica_app
    ports:
      - "8002:8002"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - ATHENA_S3_OUTPUT_LOCATION=${ATHENA_S3_OUTPUT_LOCATION}
      - ATHENA_DATABASE=${ATHENA_DATABASE}
    restart: on-failure
    networks:
      - delivery_network

# ============================
# REDES
# ============================
networks:
  delivery_network:
    driver: bridge
