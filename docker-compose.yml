version: "3.9"

services:
  ms_flota:
    build: ./Backend/MS-FLOTA
    container_name: ms_flota_app
    ports:
      - "8000:8000"
    depends_on:
      - mysql_db
    environment:
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_HOST=mysql_db
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}

  mysql_db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
  ms_pedidos:
    build: ./Backend/MS-PEDIDOS
    container_name: ms_pedidos_app
    ports:
      - "8080:8080"           # puerto externo:interno
    depends_on:
      postgres_pedidos:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres_pedidos
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    restart: on-failure

  postgres_pedidos:
    image: postgres:16-alpine
    container_name: postgres_pedidos
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_pedidos_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  postgres_pedidos_data:


